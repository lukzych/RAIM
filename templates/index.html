<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Sensor App</title>
</head>
<body>
<div class="header">
    <span class="logo">Sensor <span class="highlight">Dashboard</span></span>
</div>
<div class="toolbar">
    <div class="group" id="group-sensor">
        <span class="group-label">SENSOR</span>
        <button class="btn active-blue" onclick="setSensor('both',this)">Oba</button>
        <button class="btn" onclick="setSensor('s1',this)">Sensor 1</button>
        <button class="btn" onclick="setSensor('s2',this)">Sensor 2</button>
    </div>
    <div class="divider"></div>
    <div class="group" id="group-shape">
        <span class="group-label">KSZTAŁT</span>
        <button class="btn active-teal" onclick="setShape('sphere',this)">Sfera</button>
        <button class="btn" onclick="setShape('cube',this)">Sześcian</button>
        <button class="btn" onclick="setShape('cuboid',this)">Prostopadłościan</button>
    </div>
</div>
<div class="canvas-area">
    <div class="canvas-wrap">
        <canvas id="cv"></canvas>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
