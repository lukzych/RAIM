<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header">
        <span class="logo">Sensor Dashboard</span>
    </div>

    <div class="grid-container">

        <div class="sensor-label">ECG</div>
        <div class="canvas-wrap">
            <canvas id="cv-ECG"></canvas>
        </div>

        <div class="sensor-label">BVP</div>
        <div class="canvas-wrap">
            <canvas id="cv-BVP"></canvas>
        </div>

    </div>

    <script>
        fetch('/api/ecg')
            .then(response => response.json())
            .then(data => {
                new Chart(document.getElementById('cv-ECG'), {
                    type: 'line',
                    data: {
                        labels: data.map((_, i) => i),
                        datasets: [{
                            data: data,
                            borderColor: 'oklch(0.65 0.18 250)',
                            borderWidth: 1.5,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: { display: false },
                            y: { display: false }
                        }
                    }
                });
            });

        fetch('/api/bvp')
            .then(response => response.json())
            .then(data => {
                new Chart(document.getElementById('cv-BVP'), {
                    type: 'line',
                    data: {
                        labels: data.map((_, i) => i),
                        datasets: [{
                            data: data,
                            borderColor: 'oklch(0.65 0.18 160)',
                            borderWidth: 1.5,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: { display: false },
                            y: { display: false }
                        }
                    }
                });
            });
    </script>
</body>
</html>
