<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Sensor App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header">
        <div></div>
        <span class="logo">Sensor Dashboard</span>
        <button id="theme-btn">Light</button>
    </div>

    <div class="grid-container">
        <div class="sensor-label">ECG</div>
        <div class="canvas-wrap">
            <canvas id="cv-ECG"></canvas>
        </div>

        <div class="sensor-label">BVP</div>
        <div class="canvas-wrap">
            <canvas id="cv-BVP"></canvas>
        </div>

        <div class="sensor-label">EDA</div>
        <div class="canvas-wrap">
            <canvas id="cv-EDA"></canvas>
        </div>
    </div>
    

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
